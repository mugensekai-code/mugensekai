<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新着情報 ｜ ムゲン劇場</title>
<meta name="description" content="ライター・樽瀬川（たるせがわ）による公式サイト。最新情報、プロフィール、活動報告を掲載しています。">

<!-- 疑似RSS -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<!-- サイト共通テーマ -->
<link rel="stylesheet" href="./css/theme.css">


<style>
  /* ── top.html 固有のスタイル ── */

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    overflow-x: hidden;
    overflow-y: auto;
    min-height: 100vh;
    padding: 0 20px 100px;
  }

  /* 背景 */
  .bg-layer {
    position: fixed; inset: 0;
    background-image: url('./img/bg2.jpg');
    background-size: cover;
    background-position: center;
    z-index: 0;
    transform: scale(1.05);
    animation: subtle-drift 30s ease-in-out infinite alternate;
  }
  @keyframes subtle-drift {
    from { transform: scale(1.05) translate(0, 0); }
    to   { transform: scale(1.08) translate(-1%, 0.5%); }
  }

  .bg-overlay {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 50% 50%, rgba(12,10,8,0.2) 0%, rgba(12,10,8,0.75) 100%),
      linear-gradient(to bottom, rgba(12,10,8,0.5) 0%, rgba(12,10,8,0.1) 40%, rgba(12,10,8,0.6) 100%);
    z-index: 1;
  }

  .vignette {
    position: fixed; inset: 0; z-index: 2;
    box-shadow: inset 0 0 180px rgba(0,0,0,0.7);
    pointer-events: none;
  }

  /* メインコンテンツ */
  .content {
    position: relative; z-index: 10;
    width: min(560px, 90vw);
    padding-top: 14vh;
  }

  /* 見出し */
  .page-title {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.45em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: 0;
    animation: rise-in 1.2s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
  }

  .page-title-ja {
    font-family: var(--font-body);
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 0.15em;
    color: var(--cream);
    margin-bottom: 32px;
    opacity: 0;
    animation: rise-in 1.2s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
  }

  .title-rule {
    width: 100%;
    height: 0.5px;
    background: linear-gradient(to right, var(--gold-dim), transparent);
    margin-bottom: 32px;
    opacity: 0;
    animation: rise-in 1.2s cubic-bezier(0.16,1,0.3,1) 0.6s forwards;
  }

  /* フィード */
  #feed {
    color: var(--cream-dim);
    font-family: var(--font-body);
    font-size: 14px;
    opacity: 0;
    animation: rise-in 1.2s cubic-bezier(0.16,1,0.3,1) 0.8s forwards;
  }

  #feed dl.new {
    border-bottom: 0.5px solid var(--gold-dim);
    padding: 12px 0;
  }

  #feed dl.new dt {
    font-family: var(--font-display);
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--gold);
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  #feed dl.new dt span {
    color: var(--gold-dim);
  }

  #feed dl.new dd {
    font-size: 14px;
    letter-spacing: 0.05em;
    color: var(--cream-dim);
    line-height: 1.6;
  }

  #feed dl.new dd a {
    color: inherit;
    text-decoration: none;
    transition: color 0.3s ease;
  }

  #feed dl.new dd a:hover {
    color: var(--gold-light);
  }
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-overlay"></div>
<div class="vignette"></div>

<!-- コーナー装飾 -->
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>
<div class="rule-top"></div>
<div class="rule-bottom"></div>

<!-- メインコンテンツ -->
<div class="content">
  <p class="page-title">Latest News</p>
  <h1 class="page-title-ja">新着情報</h1>
  <div class="title-rule"></div>
  <div id="feed">読み込み中...</div>
</div>

<p class="site-footer">© 2025 · ムゲン劇場 / 
  <i>Foyer in de Opéra Garnier te Parijs</i>, 
  <a href="https://id.rijksmuseum.nl/200325145" target="_blank">Rijksmuseum</a></p>

<!-- フィード読み込み -->
<script>
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQOjS5HRRPqZsWI3c5gSz5vwaqlb_xBY-CkVQ75HDbA0clDJwnpWRFVOQ5xAv4JrTnm42jE3AghP1mo/pub?output=csv";

Papa.parse(url, {
  download: true,
  header: true,
  complete: function(results) {
    const now = new Date();
    const JST_OFFSET = 9 * 60;
    const nowJST = new Date(now.getTime() + JST_OFFSET * 60 * 1000);

    const data = results.data
      .filter(row => {
        if (!row["日付"]) return false;
        const parts = row["日付"].split(/[-\/]/);
        const pubDate = new Date(parts[0], parts[1] - 1, parts[2], 13, 0, 0);
        return nowJST >= pubDate;
      })
      .slice(0, 6);

    let html = "";
    data.forEach(row => {
      html += '<dl class="new">'
            + '<dt>' + row["日付"] + '<span>' + row["サイト"] + '</span></dt>'
            + '<dd><a href="' + row["URL"] + '" target="_blank">' + row["タイトル"] + '</a></dd>'
            + '</dl>';
    });

    document.getElementById("feed").innerHTML = html || "現在表示できる情報はありません。";
  },
  error: function(err) {
    document.getElementById("feed").textContent = "読み込みに失敗しました。";
    console.error(err);
  }
});
</script>

<script src="./js/theme.js" defer></script>
<script src="./js/nav.js" defer></script>

</body>
</html>
