<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ムゲン劇場　樽瀬川公式サイト</title>
<meta name="description" content="ライター・樽瀬川（たるせがわ）による公式サイト。最新情報、プロフィール、活動報告、を掲載しています。">
<!-- サイト共通テーマ -->
<link rel="icon" href="/favicon.png" type="image/png">
<link rel="apple-touch-icon" href="/favicon.png">
<link rel="stylesheet" href="./css/theme.css">

<!-- 疑似RSS -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>



<style>
  /* ── index.html 固有のスタイル ── */

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    overflow-x: hidden;
    overflow-y: auto;
    min-height: 100vh;
    padding: 0 20px 100px;
  }

  /* 背景 */
  .bg-layer {
    position: fixed; inset: 0;
    background-image: url('./img/bg1.jpg');
    background-size: cover;
    background-position: center;
    z-index: 0;
    transform: scale(1.05);
    animation: subtle-drift 30s ease-in-out infinite alternate;
  }
  @keyframes subtle-drift {
    from { transform: scale(1.05) translate(0, 0); }
    to   { transform: scale(1.08) translate(-1%, 0.5%); }
  }

  .bg-overlay {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 50% 50%, rgba(12,10,8,0.2) 0%, rgba(12,10,8,0.75) 100%),
      linear-gradient(to bottom, rgba(12,10,8,0.5) 0%, rgba(12,10,8,0.1) 40%, rgba(12,10,8,0.6) 100%);
    z-index: 1;
  }

  .vignette {
    position: fixed; inset: 0; z-index: 2;
    box-shadow: inset 0 0 180px rgba(0,0,0,0.7);
    pointer-events: none;
  }

  /* Enter エリア */
  .stage {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center;
    padding-top: 12vh;
    width: 100%;
  }

  .eyebrow {
    font-size: 16px;
    margin-bottom: 40px;
    opacity: 0;
    animation: rise-in 1.2s cubic-bezier(0.16,1,0.3,1) 0.4s forwards;
    color: var(--gold-light);
  }

  .enter-link {
    display: block; position: relative;
    text-decoration: none;
    opacity: 0;
    animation: appear 1.4s cubic-bezier(0.16,1,0.3,1) 0.7s forwards;
  }

  .enter-img {
    display: block;
    width: clamp(110px, 20vw, 170px);
    height: auto;
    transition: transform 0.8s cubic-bezier(0.25,0.46,0.45,0.94), filter 0.6s ease;
    filter: drop-shadow(0 8px 40px rgba(0,0,0,0.7));
  }
  .enter-link:hover .enter-img {
    transform: translateY(-6px) scale(1.03);
    filter: drop-shadow(0 20px 60px rgba(0,0,0,0.8)) drop-shadow(0 0 30px rgba(200,169,110,0.2));
  }

  .glow-ring {
    position: absolute; inset: -20px; border-radius: 50%;
    background: radial-gradient(ellipse at center, rgba(200,169,110,0.06) 0%, transparent 70%);
    pointer-events: none; opacity: 0;
    transition: opacity 0.6s ease;
  }
  .enter-link:hover .glow-ring { opacity: 1; }

  .enter-caption {
    margin-top: 32px;
    display: flex; align-items: center; gap: 14px;
    opacity: 0;
    animation: rise-in 1.2s cubic-bezier(0.16,1,0.3,1) 1.2s forwards;
  }
  .caption-line {
    width: 32px; height: 0.5px;
    background: var(--gold-dim);
    transition: width 0.5s ease, background 0.4s ease;
  }
  .enter-link:hover ~ .enter-caption .caption-line {
    width: 48px; background: var(--gold);
  }
  .caption-text {
    font-family: var(--font-display);
    font-size: 10px; font-weight: 400;
    letter-spacing: 0.5em;
    color: var(--cream-dim);
    text-transform: uppercase;
  }

  /* フィードエリア */
  .feed-section {
    position: relative; z-index: 10;
    width: min(420px, 90vw);
    margin-top: 48px;
    opacity: 0;
    animation: rise-in 1.2s cubic-bezier(0.16,1,0.3,1) 1.6s forwards;
  }

  #feed {
    color: var(--cream-dim);
    font-family: var(--font-body);
    font-size: 13px;
  }

  #feed dl.new {
    border-bottom: 0.5px solid var(--gold-dim);
    padding: 10px 0;
  }

  #feed dl.new dt {
    font-family: var(--font-display);
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--gold);
    display: flex;
    justify-content: space-between;
    margin-bottom: 4px;
  }

  #feed dl.new dt span {
    color: var(--gold-dim);
  }

  #feed dl.new dd {
    font-size: 13px;
    letter-spacing: 0.05em;
    color: var(--cream-dim);
    line-height: 1.6;
  }

  #feed dl.new dd a {
    color: inherit;
    text-decoration: none;
    transition: color 0.3s ease;
  }

  #feed dl.new dd a:hover {
    color: var(--gold-light);
  }

  .feed-more {
    text-align: right;
    margin-top: 12px;
    font-family: var(--font-body);
    font-style: italic;
    font-size: 12px;
    letter-spacing: 0.1em;
  }

  .feed-more a {
    color: var(--gold-light);
    text-decoration: none;
    transition: color 0.3s ease;
  }

  .feed-more a:hover {
    color: var(--gold-light);
  }
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-overlay"></div>
<div class="vignette"></div>

<!-- コーナー装飾 -->
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>
<div class="rule-top"></div>
<div class="rule-bottom"></div>

<!-- Enter エリア -->
<main class="stage">
  <p class="eyebrow">ムゲン劇場</p>

  <a class="enter-link" href="top.html">
    <div class="glow-ring"></div>
    <img class="enter-img" src="./img/enter.png" alt="Enter">
  </a>

  <div class="enter-caption">
    <span class="caption-line"></span>
    <span class="caption-text">Enter</span>
    <span class="caption-line"></span>
  </div>
</main>

<!-- フィードエリア -->
<div class="feed-section">
  <div id="feed">読み込み中...</div>
  <div class="feed-more">
    <p>……<a href="portfolio.html">もっと見る</a></p>
  </div>
</div>

<p class="site-footer">© 2025 · ムゲン劇場 / <i>Straat in Londen</i>, <a href="https://id.rijksmuseum.nl/200534028" target="_blank">Rijksmuseum</a></p> 


<!-- カーソルのみJS -->
<script src="./js/theme.js" defer></script>

</body>
</html>
